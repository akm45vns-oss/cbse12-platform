<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Study Hub</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">🧠</div>
      <div class="brand-text">
        <span class="brand-name">Smart Study</span>
        <span class="brand-sub">Hub</span>
      </div>
    </div>

    <nav class="sidebar-nav" role="navigation" aria-label="Main navigation">
      <a class="nav-item active" id="nav-dashboard" href="#" data-page="dashboard" aria-label="Dashboard">
        <span class="nav-icon">📊</span>
        <span class="nav-label">Dashboard</span>
        <span class="nav-indicator"></span>
      </a>
      <a class="nav-item" id="nav-courses" href="#" data-page="courses" aria-label="Courses">
        <span class="nav-icon">📚</span>
        <span class="nav-label">Courses</span>
        <span class="nav-indicator"></span>
      </a>
      <a class="nav-item" id="nav-leaderboard" href="#" data-page="leaderboard" aria-label="Leaderboard">
        <span class="nav-icon">🏆</span>
        <span class="nav-label">Leaderboard</span>
        <span class="nav-indicator"></span>
      </a>
      <a class="nav-item" id="nav-profile" href="#" data-page="profile" aria-label="Profile">
        <span class="nav-icon">👤</span>
        <span class="nav-label">Profile</span>
        <span class="nav-indicator"></span>
      </a>
    </nav>

    <div class="sidebar-xp-card">
      <div class="xp-label">Your XP</div>
      <div class="xp-value" id="sidebar-xp">342</div>
      <div class="xp-bar-wrap">
        <div class="xp-bar-fill" id="sidebar-xp-bar" style="width:34%"></div>
      </div>
      <div class="xp-level-label">Level <span id="sidebar-level">3</span> — <span id="sidebar-level-title">Learner</span></div>
    </div>

    <div class="sidebar-streak">
      <span class="streak-flame">🔥</span>
      <span class="streak-count" id="sidebar-streak">7</span>
      <span class="streak-text">day streak</span>
    </div>
  </aside>
<header class="topbar" id="topbar">
    <button class="hamburger" id="hamburger-btn" aria-label="Toggle sidebar">
      <span></span><span></span><span></span>
    </button>
    <div class="topbar-title" id="topbar-title">Dashboard</div>
    <div class="topbar-actions">
      <div class="topbar-avatar" id="topbar-avatar-wrap">
        <div class="avatar-circle" id="topbar-avatar">A</div>
        <span class="avatar-name" id="topbar-username">Alex</span>
      </div>
    </div>
  </header>
  <main class="main-content" id="main-content">
<div class="modal-overlay" id="quiz-modal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="quiz-modal-title">
      <div class="modal-box quiz-modal-box">
        <div class="quiz-header">
          <div>
            <div class="quiz-topic-label" id="quiz-topic-label">Quiz</div>
            <h2 class="modal-title" id="quiz-modal-title">Loading…</h2>
          </div>
          <div class="quiz-meta-row">
            <div class="quiz-timer" id="quiz-timer">⏱ 00:00</div>
            <div class="quiz-progress-label" id="quiz-progress-lbl">Q 1 / 5</div>
            <button class="modal-close-btn" id="close-quiz-btn" aria-label="Close quiz">✕</button>
          </div>
        </div>
        <div class="quiz-progress-bar-wrap">
          <div class="quiz-progress-bar-fill" id="quiz-progress-bar" style="width:0%"></div>
        </div>

        <div id="quiz-question-area">
          <p class="quiz-question" id="quiz-question-text">Question goes here?</p>
          <div class="quiz-options" id="quiz-options-list"></div>
          <div class="quiz-explanation hidden" id="quiz-explanation"></div>
        </div>

        <div class="quiz-footer">
          <button class="btn-ghost" id="quiz-skip-btn">Skip</button>
          <button class="btn-primary" id="quiz-next-btn" disabled>Next →</button>
        </div>

        <!-- Result Screen -->
        <div class="quiz-result hidden" id="quiz-result">
          <div class="result-icon" id="result-icon">🎉</div>
          <h2 class="result-title" id="result-title">Quiz Complete!</h2>
          <div class="result-score-big" id="result-score-big">0/0</div>
          <div class="result-score-pct" id="result-score-pct">0%</div>
          <div class="result-badges" id="result-badges"></div>
          <div class="result-xp" id="result-xp">+0 XP earned</div>
          <div class="result-actions">
            <button class="btn-ghost" id="quiz-retry-btn">Retry</button>
            <button class="btn-primary" id="quiz-done-btn">Done ✓</button>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script src="js/app.js"></script>
  <script src="js/quiz.js"></script>
</body>
</html>
