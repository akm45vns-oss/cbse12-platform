version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: akmedu-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: akmedu-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=development
      - REDIS_URL=redis://redis:6379
      - CORS_ORIGIN=http://localhost:80
      - JWT_SECRET=${JWT_SECRET:-fallback_secret_key_change_me_in_prod_12345}
      - SUPABASE_URL=${VITE_SUPABASE_URL}
      - SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./server/logs:/usr/src/app/logs

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: akmedu-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  redis_data:
